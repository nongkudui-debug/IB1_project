<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>喫茶 木漏れ日</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="font-serif text-white">

  <section class="relative h-screen bg-cover bg-center" style="background-image: url('hero.jpg');">
    <div class="absolute inset-0 bg-black/40"></div>

    <header class="relative z-10 flex items-center gap-3 p-6">
      <img src="logo.png" alt="喫茶 木漏れ日 ロゴ" class="w-10 h-10">
      <h1 class="text-xl tracking-widest">喫茶 木漏れ日</h1>
    </header>

    <div class="relative z-10 flex h-[75vh] flex-col items-center justify-center text-center px-6">
      <p class="mb-4 text-sm tracking-[0.4em]">KOMOREBI</p>
      <h2 class="text-4xl md:text-6xl leading-relaxed tracking-widest">
        木漏れ日にほどける、<br>心の余白。
      </h2>
      <p class="mt-6 text-sm md:text-base tracking-widest">
        静寂と和モダンが包む、大人の隠れ家。
      </p>
      <a href="#reserve" class="mt-10 border border-white px-8 py-3 text-sm tracking-widest hover:bg-white hover:text-black transition">
        ご予約はこちら
      </a>
    </div>
  </section>

</body>
</html>
