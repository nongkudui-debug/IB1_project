<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>喫茶 木漏れ日</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>

    <div class="site-container">
        
        <header class="shop-sidebar">
            <h1 class="shop-name">
                喫茶 木漏れ日
                <span class="shop-sub-badge">珈琲</span>
            </h1>
        </header>

        <main class="main-content">
            
            <section class="intro-section">
                <p>懐かしくも新しい、和モダンの静かな空間。</p>
                <p>丁寧に淹れた珈琲と、窓から届く木漏れ日。</p>
                <p>ここにあるのは、心ほどける穏やかな時間だけです。</p>
                
                <p class="intro-lead">喧騒を忘れ、自分に帰るひとときを。</p>
                <p>喫茶「木漏れ日」で、お待ちしております。</p>
            </section>

            <section class="gallery-section" aria-label="ギャラリー">
                <div class="gallery-grid">
                    
                    <article class="gallery-item">
                        <div class="image-box">
                            <img src="photo1.png" alt="喫茶木漏れ日の外観">
                        </div>
                        <p class="item-caption">路地裏の木漏れ日、静かなはじまり。</p>
                    </article>

                    <article class="gallery-item">
                        <div class="image-box">
                            <img src="photo2.png" alt="店内で読書を楽しむ様子">
                        </div>
                        <p class="item-caption">何もしない贅沢を、ここで。</p>
                    </article>

                    <article class="gallery-item">
                        <div class="image-box">
                            <img src="photo3.png" alt="淹れたての温かい珈琲">
                        </div>
                        <p class="item-caption">手仕事の温もり、淹れたての香り。</p>
                    </article>

                </div>
            </section>

            <div class="footer-controls">
                <a href="#reserve" class="btn-reservation">御予約はこちら</a>
                <small class="copyright">&copy; KOMOREBI</small>
            </div>

        </main>

    </div>

</body>
</html>
