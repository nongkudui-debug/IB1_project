<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>喫茶 木漏れ日 | 公式サイト</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="stage-wrapper">
        <header class="main-header">
            <h1 class="shop-logo-bold">喫茶 木漏れ日</h1>
        </header>

        <main class="content-core">
            <section class="concept-impact">
                <div class="concept-text">
                    <p>
                        懐かしくも新しい、和モダンの静かな空間。<br>
                        丁寧に淹れた珈琲と、窓から届く木漏れ日。<br>
                        ここにあるのは、心ほどける穏やかな時間だけです。<br>
                        <br>
                        喧騒を忘れ、自分に帰るひとときを。<br>
                        喫茶「木漏れ日」で、お待ちしております。
                    </p>
                </div>
            </section>

            <section class="visual-gallery">
                <div class="photo-strip">
                    <article class="panel">
                        <div class="img-wrap">
                            <img src="外観.png" alt="外観">
                        </div>
                        <p class="photo-caption">路地裏の木漏れ日、静かなはじまり。</p>
                    </article>

                    <article class="panel">
                        <div class="img-wrap">
                            <img src="チル.png" alt="チル">
                        </div>
                        <p class="photo-caption">何もしない贅沢を、ここで。</p>
                    </article>

                    <article class="panel">
                        <div class="img-wrap">
                            <img src="コーヒー.png" alt="珈琲">
                        </div>
                        <p class="photo-caption">手仕事の温もり、淹れたての香り。</p>
                    </article>
                </div>
            </section>

            <div class="action-gate">
                <a href="#" class="btn-reserve-bold">
                    <span>御予約はこちら</span>
                </a>
            </div>
        </main>

        <footer class="micro-footer">
            <p>&copy; KOMOREBI</p>
        </footer>
    </div>

</body>
</html>
