<!DOCTYPE html><!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>喫茶 木漏れ日 | 案内帖</title>
    <style>
        :root { 
            --bg: #0f0f0f; /* より深い闇 */
            --accent: #d4b483; /* 落ち着いた金 */
            --text: #fdfaf6; 
            --gold-sub: rgba(212, 180, 131, 0.4);
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* 柔らかな木漏れ日の光芒 */
        .sunlight {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 70% 20%, rgba(212, 180, 131, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 20% 80%, rgba(212, 180, 131, 0.05) 0%, transparent 40%);
            z-index: -1;
        }

        /* 外枠：一期一会の縁取り */
        .main-frame {
            border-left: 1px solid var(--accent);
            border-right: 1px solid var(--accent);
            padding: 100px 80px;
            text-align: center;
            position: relative;
            max-width: 600px;
            width: 80%;
            background: linear-gradient(to bottom, rgba(20, 20, 20, 0) 0%, rgba(20, 20, 20, 0.8) 50%, rgba(20, 20, 20, 0) 100%);
        }

        /* 縦書きのアクセントラベル */
        .vertical-accent {
            position: absolute;
            top: 50%;
            left: -15px;
            transform: translateY(-50%);
            writing-mode: vertical-rl;
            background: var(--bg);
            padding: 20px 5px;
            letter-spacing: 0.8em;
            color: var(--accent);
            font-size: 0.75rem;
            border: 1px solid var(--gold-sub);
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 60px;
            letter-spacing: 0.8em;
            font-weight: 300;
            text-indent: 0.8em; /* 中央揃え調整 */
        }

        .nav-list {
            list-style: none;
            padding: 0;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        .nav-item {
            opacity: 0;
            animation: fadeIn 1.5s forwards;
        }

        .nav-link {
            text-decoration: none;
            color: var(--text);
            font-size: 1.1rem;
            transition: 0.6s cubic-bezier(0.22, 1, 0.36, 1);
            display: block;
            writing-mode: vertical-rl; /* リンクも縦書きにして風情を出す */
            padding: 20px 10px;
            letter-spacing: 0.3em;
            border: 1px solid transparent;
        }

        .nav-link:hover {
            color: var(--accent);
            border: 1px solid var(--gold-sub);
            background: rgba(212, 180, 131, 0.05);
            transform: translateY(-10px);
        }

        /* 装飾的な区切り線（中央） */
        .divider {
            width: 1px;
            height: 100px;
            background: linear-gradient(to bottom, transparent, var(--accent), transparent);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 令和の刻印 */
        .era {
            position: absolute;
            bottom: 20px;
            right: 20px;
            font-size: 0.7rem;
            color: var(--gold-sub);
            letter-spacing: 0.2em;
        }
    </style>
</head>
<body>
    <div class="sunlight"></div>
    
    <div class="main-frame">
        <div class="vertical-accent">喫茶 木漏れ日</div>
        <h1>案内帖</h1>
        
        <nav>
            <ul class="nav-list">
                <li class="nav-item" style="animation-delay: 0.5s;">
                    <a href="page1.html" class="nav-link">一．静の刻（壱の頁）</a>
                </li>
                
                <div class="divider"></div>

                <li class="nav-item" style="animation-delay: 0.8s;">
                    <a href="page2.html" class="nav-link">二．動の彩（弐の頁）</a>
                </li>
            </ul>
        </nav>

        <div class="era">令和八年 皐月</div>
    </div>
</body>
</html>
