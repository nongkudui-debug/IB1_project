        .links { margin-top: 30px; display: flex; gap: 20px; justify-content: center; }

        <h1>喫茶 木漏れ日 制作記録</h1>

        <div class="links">
            <!-- ここでday1とday2のフォルダ内にあるindex.htmlへリンクを飛ばしています -->

            <a href="day2/index.html">2日目の課題 (カフェサイト)</a>

    </div>

</html>
