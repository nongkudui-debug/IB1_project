<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>喫茶 木漏れ日 | 案内帖</title>
    <style>
        :root { 
            --bg: #0f0f0f; 
            --accent: #d4b483; 
            --text: #fdfaf6; 
            --gold-sub: rgba(212, 180, 131, 0.4);
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .sunlight {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 70% 20%, rgba(212, 180, 131, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 20% 80%, rgba(212, 180, 131, 0.05) 0%, transparent 40%);
            z-index: -1;
        }

        .main-frame {
            border-left: 1px solid var(--accent);
            border-right: 1px solid var(--accent);
            padding: 80px 60px;
            text-align: center;
            position: relative;
            max-width: 600px;
            width: 80%;
            background: linear-gradient(to bottom, rgba(20, 20, 20, 0) 0%, rgba(20, 20, 20, 0.8) 50%, rgba(20, 20, 20, 0) 100%);
        }

        .vertical-accent {
            position: absolute;
            top: 50%;
            left: -15px;
            transform: translateY(-50%);
            writing-mode: vertical-rl;
            background: var(--bg);
            padding: 20px 5px;
            letter-spacing: 0.8em;
            color: var(--accent);
            font-size: 0.75rem;
            border: 1px solid var(--gold-sub);
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 50px;
            letter-spacing: 0.6em;
            font-weight: 500;
        }

        .nav-list {
            list-style: none;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 60px;
        }

        .nav-item {
            opacity: 0;
            animation: fadeIn 1.5s forwards;
        }

        /* リンク修正ポイント: hrefを確実に設定 */
        .nav-link {
            text-decoration: none;
            color: var(--text);
            font-size: 1.2rem;
            transition: 0.5s;
            display: block;
            writing-mode: vertical-rl;
            padding: 20px 10px;
            letter-spacing: 0.4em;
            border: 1px solid transparent;
        }

        .nav-link:hover {
            color: var(--accent);
            background: rgba(212, 180, 131, 0.05);
            transform: translateY(-10px);
        }

        .divider {
            width: 1px;
            height: 80px;
            background: var(--accent);
            opacity: 0.5;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .footer-note {
            margin-top: 50px;
            font-size: 0.7rem;
            color: var(--gold-sub);
            letter-spacing: 0.1em;
        }
    </style>
</head>
<body>
    <div class="sunlight"></div>
    
    <div class="main-frame">
        <div class="vertical-accent">御品書</div>
        <h1>案内帖</h1>
        
        <nav>
            <ul class="nav-list">
                <!-- href属性を ./filename.html の形式に変更 -->
                <li class="nav-item" style="animation-delay: 0.3s;">
                    <a href="./page1.html" class="nav-link">一．壱の頁</a>
                </li>
                
                <div class="divider"></div>

                <li class="nav-item" style="animation-delay: 0.6s;">
                    <a href="./page2.html" class="nav-link">二．弐の頁</a>
                </li>
            </ul>
        </nav>

        <div class="footer-note">喫茶 木漏れ日</div>
    </div>
</body>
</html>
