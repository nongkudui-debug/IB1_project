<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pop & Retro Cafe Menu</title>
    <style>
        /* 全体のリセットと背景設定 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
            background-color: #faf7f2; /* 温かみのある生成り色 */
            color: #2c2c2c;
            padding: 40px 20px;
        }

        /* タイトルエリア */
        header {
            text-align: center;
            margin-bottom: 50px;
        }

        header h1 {
            font-size: 36px;
            font-weight: 900;
            color: #d35400; /* 深みのあるオレンジ */
            letter-spacing: 2px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        header p {
            font-size: 14px;
            color: #7f8c8d;
        }

        /* メニューのグリッドコンテナ */
        .menu-container {
            max-width: 1100px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
        }

        /* おしゃれなカードのスタイル（太枠＋立体的な影でポップさを演出） */
        .menu-card {
            background-color: #ffffff;
            border: 4px solid #2c2c2c; /* クッキリとした黒の太枠 */
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            box-shadow: 8px 8px 0px #2c2c2c; /* ぼかさない立体的な影 */
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        /* カードのホバーエフェクト（ちょっと浮き上がる） */
        .menu-card:hover {
            transform: translate(-4px, -4px);
            box-shadow: 12px 12px 0px #2c2c2c;
        }

        /* 画像アイコンエリア */
        .menu-icon {
            font-size: 64px;
            margin-bottom: 15px;
            display: inline-block;
            filter: drop-shadow(3px 3px 0px rgba(0,0,0,0.1));
            animation: float 3s ease-in-out infinite alternate;
        }

        /* アイコンのぷかぷかアニメーション */
        @keyframes float {
            0% { transform: translateY(0px); }
            100% { transform: translateY(-6px); }
        }

        /* メニュー名 */
        .menu-name {
            font-size: 20px;
            font-weight: bold;
            color: #2c2c2c;
            margin-bottom: 12px;
            min-height: 56px; /* 2行になっても高さが崩れないように固定 */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 価格タグ */
        .menu-price {
            display: inline-block;
            background-color: #ffeaa7; /* 優しいイエロー */
            color: #2c2c2c;
            font-size: 18px;
            font-weight: 800;
            padding: 6px 16px;
            border: 2px solid #2c2c2c;
            border-radius: 30px;
            box-shadow: 2px 2px 0px #2c2c2c;
        }

        /* レトロな装飾用ライン */
        .menu-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 8px;
            background: repeating-linear-gradient(
                45deg,
                #e74c3c,
                #e74c3c 10px,
                #ffffff 10px,
                #ffffff 20px
            );
        }
    </style>
</head>
<body>

    <header>
        <h1>Retro Pop Cafe</h1>
        <p>こだわりの自家製メニュー</p>
    </header>

    <main class="menu-container" id="menu-gallery"></main>

    <script>
        // 1. 架空のカフェメニューデータ（JSON形式の配列）
        const menuData = [
            {
                "name": "完熟あまおう苺の贅沢パンケーキ",
                "price": 1280,
                "icon": "🥞"
            },
            {
                "name": "路地裏の木漏れ日ビターラテ",
                "price": 580,
                "icon": "☕"
            },
            {
                "name": "クラシック・自家製カスタードプリン",
                "price": 450,
                "icon": "🍮"
            },
            {
                "name": "手仕事の温もりスパイスカレー",
                "price": 1100,
                "icon": "🍛"
            },
            {
                "name": "翡翠色のクリームソーダ",
                "price": 650,
                "icon": "🍹"
            },
            {
                "name": "焼きたてサクサク・芳醇バタークロワッサン",
                "price": 380,
                "icon": "🥐"
            }
        ];

        // 2. HTMLを出力する先の要素を取得
        const gallery = document.getElementById('menu-gallery');

        // 3. JavaScriptの for文 を使ってデータをカード形式で展開
        for (let i = 0; i < menuData.length; i++) {
            const item = menuData[i];

            // カードとなるdiv要素を作成
            const card = document.createElement('div');
            card.classList.add('menu-card');

            // カードの内部HTMLを組み立てる
            card.innerHTML = `
                <div class="menu-icon">${item.icon}</div>
                <div class="menu-name">${item.name}</div>
                <div class="menu-price">¥${item.price.toLocaleString()}</div>
            `;

            // コンテナにカードを追加
            gallery.appendChild(card);
        }
    </script>

</body>
</html>
