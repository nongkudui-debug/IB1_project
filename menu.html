<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>喫茶 木漏れ日 - お品書き</title>
    <style>
        /* 全体の設定 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Georgia', 'Times New Roman', 'Hiragino Mincho ProN', 'MS Mincho', serif;
            background-color: #f7f5f0; /* 落ち着いた和紙のような生成り色 */
            color: #2c2520; /* 深みのあるセピアブラック */
            padding: 60px 20px;
            line-height: 1.8;
        }

        /* 外枠（縦書きの静けさを引き立てる端正な細枠） */
        .wrapper {
            max-width: 1000px;
            margin: 0 auto;
            border: 1px solid #c2b69d;
            padding: 50px 40px;
            background-color: #ffffff;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        /* ヘッダーエリア */
        header {
            text-align: center;
            margin-bottom: 60px;
            border-bottom: 1px double #c2b69d;
            padding-bottom: 30px;
        }

        header h1 {
            font-size: 28px;
            font-weight: normal;
            color: #4a3b32;
            letter-spacing: 6px;
            margin-bottom: 12px;
        }

        header p {
            font-size: 13px;
            color: #8c7e6c;
            letter-spacing: 2px;
        }

        /* メニューのグリッドコンテナ */
        .menu-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 40px;
        }

        /* 和モダンなメニューカード */
        .menu-card {
            background-color: #faf9f6;
            border-left: 3px solid #8a7355; /* 落ち着いた真鍮・木目色のアクセントライン */
            padding: 25px;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* 凛とした佇まいのホバーエフェクト */
        .menu-card:hover {
            transform: translateY(-3px);
            background-color: #f4f1ea;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.03);
        }

        /* 上部エリア（アイコンと名前） */
        .card-top {
            margin-bottom: 20px;
        }

        /* 上品なアイコン */
        .menu-icon {
            font-size: 32px;
            margin-bottom: 15px;
            opacity: 0.85;
        }

        /* メニュー名 */
        .menu-name {
            font-size: 18px;
            font-weight: 600;
            color: #362e2b;
            letter-spacing: 1px;
            line-height: 1.5;
            min-height: 54px; /* 2行になっても美しく揃うように固定 */
            display: flex;
            align-items: center;
        }

        /* 下部エリア（価格） */
        .card-bottom {
            text-align: right;
        }

        /* すっきりとした価格表示 */
        .menu-price {
            font-size: 16px;
            color: #615249;
            letter-spacing: 1px;
            border-bottom: 1px dashed #d1c7bd;
            padding-bottom: 4px;
            display: inline-block;
        }

        /* フッター（コピーライト） */
        footer {
            text-align: center;
            margin-top: 60px;
            font-size: 11px;
            color: #a39684;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <header>
            <h1>喫茶 木漏れ日</h1>
            <p>懐かしくも新しい、和モダンの静かな空間</p>
        </header>

        <main class="menu-container" id="menu-gallery"></main>

        <footer>
            © KOMOREBI
        </footer>
    </div>

    <script>
        // 1. 喫茶「木漏れ日」の和モダンなメニューデータ（JSON形式の配列）
        const menuData = [
            {
                "name": "木漏れ日ブレンド（深煎り・ネルドリップ）",
                "price": 600,
                "icon": "☕"
            },
            {
                "name": "特製 宇治抹茶の濃厚テリーヌショコラ",
                "price": 680,
                "icon": "🍵"
            },
            {
                "name": "琥珀色の自家製カスタードプリン（みたらしカラメル）",
                "price": 550,
                "icon": "🍮"
            },
            {
                "name": "静寂を味わう 漆黒の炭焼き珈琲ゼリー",
                "price": 580,
                "icon": "🍨"
            },
            {
                "name": "燻製醤油が隠し味の和風キーマカレー（サラダ付）",
                "price": 1200,
                "icon": "🍛"
            },
            {
                "name": "加賀棒茶の香ばしロイヤルミルクティ",
                "price": 650,
                "icon": "🥛"
            }
        ];

        // 2. HTMLを出力するコンテナを取得
        const gallery = document.getElementById('menu-gallery');

        // 3. for文を使ってデータをカード形式で展開
        for (let i = 0; i < menuData.length; i++) {
            const item = menuData[i];

            // カードとなるdiv要素を作成
            const card = document.createElement('div');
            card.classList.add('menu-card');

            // 落ち着いた雰囲気に合わせて内部HTMLを組み立て
            card.innerHTML = `
                <div class="card-top">
                    <div class="menu-icon">${item.icon}</div>
                    <div class="menu-name">${item.name}</div>
                </div>
                <div class="card-bottom">
                    <div class="menu-price">お代 ${item.price.toLocaleString()} 円</div>
                </div>
            `;

            // コンテナにカードを追加
            gallery.appendChild(card);
        }
    </script>

</body>
</html>
