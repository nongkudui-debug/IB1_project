<!DOCTYPE html>

<title>喫茶 木漏れ日｜館内案内</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:"Yu Mincho","Hiragino Mincho ProN",serif;
    background:#f7f5f0;
    color:#3b3028;
}

/* 背景 */

body::before{
    content:"";
    position:fixed;
    inset:0;
    background:url("hero.jpg") center/cover no-repeat;
    filter:brightness(.45);
    z-index:-2;
}

body::after{
    content:"";
    position:fixed;
    inset:0;
    background:rgba(245,241,232,.65);
    backdrop-filter:blur(4px);
    z-index:-1;
}

/* 中央 */

.container{

    width:90%;
    max-width:900px;

    margin:80px auto;

    background:rgba(255,255,255,.88);

    border-radius:20px;

    padding:60px;

    box-shadow:0 20px 60px rgba(0,0,0,.15);

}

/* タイトル */

.small{

    text-align:center;

    letter-spacing:8px;

    color:#9b8d76;

    margin-bottom:15px;

    font-size:14px;

}

h1{

    text-align:center;

    font-size:48px;

    font-weight:normal;

    letter-spacing:8px;

    margin-bottom:20px;

}

.catch{

    text-align:center;

    color:#6f6458;

    line-height:2;

    margin-bottom:60px;

}

/* リンク */

.menu{

    display:grid;

    gap:25px;

}

.card{

    display:flex;

    justify-content:space-between;

    align-items:center;

    padding:30px;

    background:#faf8f3;

    border-left:6px solid #9d8666;

    border-radius:15px;

    transition:.35s;

    text-decoration:none;

    color:#3b3028;

}

.card:hover{

    transform:translateX(10px);

    background:white;

    box-shadow:0 15px 30px rgba(0,0,0,.08);

}

.title{

    font-size:26px;

    margin-bottom:8px;

}

.sub{

    color:#8a7a69;

    line-height:1.8;

}

.arrow{

    font-size:30px;

    color:#b29a78;

}

/* フッター */

footer{

    text-align:center;

    margin-top:60px;

    color:#8b7d69;

    letter-spacing:3px;

}

@media(max-width:768px){

.container{

padding:35px 25px;

}

h1{

font-size:36px;

}

.title{

font-size:22px;

}

.card{

flex-direction:column;

align-items:flex-start;

gap:20px;

}

.arrow{

display:none;

}

}

</style>

</head>
