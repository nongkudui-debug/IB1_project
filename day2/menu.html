<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お品書き - 喫茶 木漏れ日</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Georgia', 'Times New Roman', 'Hiragino Mincho ProN', 'MS Mincho', serif;
            background-color: #f7f5f0;
            color: #2c2520;
            padding: 60px 20px;
            line-height: 1.8;
        }

        .wrapper {
            max-width: 1000px;
            margin: 0 auto;
            border: 1px solid #c2b69d;
            padding: 50px 40px;
            background-color: #ffffff;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        header {
            text-align: center;
            margin-bottom: 60px;
            border-bottom: 1px double #c2b69d;
            padding-bottom: 30px;
        }

        header h1 {
            font-size: 28px;
            font-weight: normal;
            color: #4a3b32;
            letter-spacing: 6px;
            margin-bottom: 12px;
        }

        header p {
            font-size: 13px;
            color: #8c7e6c;
            letter-spacing: 2px;
        }

        .menu-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 40px;
        }

        .menu-card {
            background-color: #faf9f6;
            border-left: 3px solid #8a7355; /* 上品なアクセントライン */
            padding: 25px;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .menu-card:hover {
            transform: translateY(-3px);
            background-color: #f4f1ea;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.03);
        }

        .card-top {
            margin-bottom: 20px;
        }

        .menu-icon {
            font-size: 32px;
            margin-bottom: 15px;
            opacity: 0.85;
        }

        .menu-name {
            font-size: 17px;
            font-weight: 600;
            color: #362e2b;
            letter-spacing: 1px;
            line-height: 1.5;
            min-height: 54px;
            display: flex;
            align-items: center;
        }

        .card-bottom {
            text-align: right;
        }

        .menu-price {
            font-size: 15px;
            color: #615249;
            letter-spacing: 1px;
            border-bottom: 1px dashed #d1c7bd;
            padding-bottom: 4px;
            display: inline-block;
        }

        /* 下部の操作エリア */
        .action-area {
            text-align: center;
            margin-top: 60px;
            border-top: 1px solid #faf9f6;
            padding-top: 30px;
        }

        .back-btn {
            display: inline-block;
            padding: 10px 30px;
            border: 1px solid #8a7355;
            color: #8a7355;
            text-decoration: none;
            font-size: 13px;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background-color: #8a7355;
            color: #ffffff;
        }

        footer {
            text-align: center;
            margin-top: 30px;
            font-size: 11px;
            color: #a39684;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <header>
            <h1>喫茶 木漏れ日</h1>
            <p>厳選された和モダンのお品書き</p>
        </header>

        <main class="menu-container" id="menu-gallery"></main>

        <div class="action-area">
            <a href="index.html" class="back-btn">案内処へ戻る</a>
        </div>

        <footer>
            © KOMOREBI
        </footer>
    </div>

    <script>
        // 1. 統一された和のカフェメニューデータ
        const menuData = [
            {
                "name": "木漏れ日ブレンド（深煎り・ネルドリップ）",
                "price": 600,
                "icon": "☕"
            },
            {
                "name": "特製 宇治抹茶の濃厚テリーヌショコラ",
                "price": 680,
                "icon": "🍵"
            },
            {
                "name": "琥珀色の自家製カスタードプリン（みたらしカラメル）",
                "price": 550,
                "icon": "🍮"
            },
            {
                "name": "静寂を味わう 漆黒の炭焼き珈琲ゼリー",
                "price": 580,
                "icon": "🍨"
            },
            {
                "name": "燻製醤油が隠し味の和風キーマカレー（サラダ付）",
                "price": 1200,
                "icon": "🍛"
            },
            {
                "name": "加賀棒茶の香ばしロイヤルミルクティ",
                "price": 650,
                "icon": "🥛"
            }
        ];

        const gallery = document.getElementById('menu-gallery');

        // 2. JavaScriptのfor文を使った動的HTML生成
        for (let i = 0; i < menuData.length; i++) {
            const item = menuData[i];

            const card = document.createElement('div');
            card.classList.add('menu-card');

            card.innerHTML = `
                <div class="card-top">
                    <div class="menu-icon">${item.icon}</div>
                    <div class="menu-name">${item.name}</div>
                </div>
                <div class="card-bottom">
                    <div class="menu-price">お代 ${item.price.toLocaleString()} 円</div>
                </div>
            `;

            gallery.appendChild(card);
        }
    </script>

</body>
</html>
