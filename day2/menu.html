<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>お品書き | 喫茶 木漏れ日</title>
    <style>
        :root { --bg: #1a1a1a; --accent: #d4b483; --text: #fdfaf6; }
        body { background: var(--bg); color: var(--text); font-family: serif; text-align: center; padding: 60px 20px; }
        .back-home { position: fixed; top: 20px; left: 20px; text-decoration: none; color: var(--accent); border: 1px solid var(--accent); padding: 8px 15px; }
        #menu-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; max-width: 1000px; margin: 40px auto; }
        .card { background: #2a2a2a; padding: 20px; border: 1px solid #333; transition: 0.4s; }
        .card:hover { border-color: var(--accent); transform: translateY(-5s); }
        .price { color: var(--accent); display: block; margin-top: 10px; }
    </style>
</head>
<body>
    <a href="index.html" class="back-home">← 戻る</a>
    <h1>お品書き</h1>
    <div id="menu-grid"></div>
    <script>
        const data = [
            {n:"琥珀色の深煎り", p:"¥650", i:"☕"}, {n:"木漏れ日ブレンド", p:"¥600", i:"🌿"},
            {n:"冷製 雫珈琲", p:"¥700", i:"❄️"}, {n:"静寂の抹茶ラテ", p:"¥750", i:"🍵"},
            {n:"自家製カステラ", p:"¥550", i:"🍰"}, {n:"季節の和菓子", p:"¥500", i:"🍡"},
            {n:"小豆のトースト", p:"¥680", i:"🍞"}, {n:"宵待ちの茶", p:"¥650", i:"🫖"}
        ];
        const grid = document.getElementById('menu-grid');
        data.forEach(item => {
            grid.innerHTML += `<div class="card"><span>${item.i}</span><br><strong>${item.n}</strong><span class="price">${item.p}</span></div>`;
        });
    </script>
</body>
</html>
