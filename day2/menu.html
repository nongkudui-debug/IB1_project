<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>喫茶 木漏れ日 | お品書き</title>
    <style>
        :root {
            --main-bg: #1a1a1a;
            --card-bg: #2a2a2a;
            --accent: #d4b483;
            --text: #fdfaf6;
        }

        body {
            background-color: var(--main-bg);
            color: var(--text);
            font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1 {
            font-size: 3rem;
            margin: 40px 0;
            letter-spacing: 0.3em;
            border-bottom: 1px solid var(--accent);
            padding-bottom: 10px;
        }

        /* メニューを並べるグリッド */
        #menu-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr); /* 4列に並べる */
            gap: 25px;
            width: 90%;
            max-width: 1200px;
            padding-bottom: 50px;
        }

        /* カード形式のスタイル */
        .menu-card {
            background: var(--card-bg);
            border: 1px solid #3d3d3d;
            padding: 20px;
            text-align: center;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        .menu-card:hover {
            transform: translateY(-10px);
            border-color: var(--accent);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .menu-icon {
            font-size: 3rem;
            margin-bottom: 15px;
            display: block;
        }

        .menu-name {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 10px;
            display: block;
        }

        .menu-price {
            font-size: 1.1rem;
            color: var(--accent);
            letter-spacing: 0.1em;
        }

        /* 教授も驚く「装飾線」の演出 */
        .menu-card::before {
            content: "";
            position: absolute;
            top: 0; left: 0;
            width: 0; height: 2px;
            background: var(--accent);
            transition: 0.4s;
        }
        .menu-card:hover::before { width: 100%; }

        @media (max-width: 1024px) { #menu-container { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 600px) { #menu-container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <h1>お品書き</h1>

    <div id="menu-container">
        <!-- ここにJavaScriptでカードが生成されます -->
    </div>

    <script>
        // 1. JSON形式の配列変数
        const menuData = [
            { "name": "琥珀色の深煎り", "price": "¥650", "icon": "☕" },
            { "name": "木漏れ日ブレンド", "price": "¥600", "icon": "🌿" },
            { "name": "冷製 雫珈琲", "price": "¥700", "icon": "❄️" },
            { "name": "静寂の抹茶ラテ", "price": "¥750", "icon": "🍵" },
            { "name": "自家製カステラ", "price": "¥550", "icon": "🍰" },
            { "name": "季節の和菓子", "price": "¥500", "icon": "🍡" },
            { "name": "小豆のトースト", "price": "¥680", "icon": "🍞" },
            { "name": "宵待ちのハーブティー", "price": "¥650", "icon": "🫖" }
        ];

        // 2. JavaScriptの for文 を使ってカードを生成
        const container = document.getElementById('menu-container');

        for (let i = 0; i < menuData.length; i++) {
            const item = menuData[i];

            // HTML要素の作成
            const card = document.createElement('div');
            card.className = 'menu-card';

            // カードの中身を組み立て
            card.innerHTML = `
                <span class="menu-icon">${item.icon}</span>
                <span class="menu-name">${item.name}</span>
                <span class="menu-price">${item.price}</span>
            `;

            // コンテナに追加
            container.appendChild(card);
        }
    </script>
</body>
</html>
