<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>対話帳 | 喫茶 木漏れ日</title>
    <style>
        :root { --bg: #1a1a1a; --accent: #d4b483; --text: #fdfaf6; }
        body { background: var(--bg); color: var(--text); font-family: serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .back-home { position: fixed; top: 20px; left: 20px; text-decoration: none; color: var(--accent); border: 1px solid var(--accent); padding: 8px 15px; }
        .chat-box { width: 400px; height: 500px; border: 1px solid var(--accent); display: flex; flex-direction: column; background: #222; }
        #log { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px; border-radius: 5px; max-width: 80%; }
        .ai { background: #2a2a2a; align-self: flex-start; border-left: 2px solid var(--accent); }
        .user { background: #3d3d3d; align-self: flex-end; }
        .input-area { display: flex; padding: 10px; background: #111; }
        input { flex: 1; background: #333; border: none; color: white; padding: 10px; }
        button { background: var(--accent); border: none; padding: 10px 20px; cursor: pointer; }
    </style>
</head>
<body>
    <a href="index.html" class="back-home">← 戻る</a>
    <div class="chat-box">
        <div id="log"><div class="msg ai">御用を承ります。（例：珈琲、おすすめ）</div></div>
        <div class="input-area">
            <input type="text" id="in" placeholder="言葉を入力...">
            <button onclick="send()">送信</button>
        </div>
    </div>
    <script>
        function send() {
            const i = document.getElementById('in');
            const l = document.getElementById('log');
            if(!i.value) return;
            l.innerHTML += `<div class="msg user">${i.value}</div>`;
            let r = "左様でございますか。";
            if(i.value.includes("珈琲")) r = "当店の珈琲は、心を込めて淹れております。";
            if(i.value.includes("おすすめ")) r = "自家製カステラが本日のおすすめです。";
            setTimeout(() => { l.innerHTML += `<div class="msg ai">${r}</div>`; l.scrollTop = l.scrollHeight; }, 600);
            i.value = "";
        }
    </script>
</body>
</html>
