<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>対話帳 | 喫茶 木漏れ日</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --accent: #b89c6d;
            --text: #fdfaf6;
            --border: rgba(184, 156, 109, 0.3);
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background-image: radial-gradient(circle at 50% 50%, #1a1a1a 0%, #0a0a0a 100%);
        }

        .back-home {
            position: fixed; top: 40px; left: 40px;
            text-decoration: none; color: var(--accent);
            font-size: 0.8rem; letter-spacing: 0.2em;
            border-bottom: 1px solid var(--accent);
            padding-bottom: 5px; transition: 0.4s;
        }
        .back-home:hover { opacity: 0.6; }

        /* 対話空間のフレーム */
        .chat-container {
            width: 90%;
            max-width: 700px;
            height: 70vh;
            display: flex;
            flex-direction: column;
            border: 1px solid var(--border);
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(10px);
            position: relative;
        }

        .chat-header {
            padding: 30px;
            text-align: center;
            border-bottom: 1px solid var(--border);
            letter-spacing: 0.6em;
            font-size: 0.9rem;
            color: var(--accent);
        }

        /* ログ部分 */
        #log {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 30px;
            scrollbar-width: none; /* Firefox */
        }
        #log::-webkit-scrollbar { display: none; } /* Chrome, Safari */

        .msg {
            max-width: 80%;
            line-height: 1.8;
            letter-spacing: 0.1em;
            font-size: 1.1rem;
            position: relative;
        }

        .ai {
            align-self: flex-start;
            color: var(--text);
            border-left: 1px solid var(--accent);
            padding-left: 20px;
            animation: fadeInBlur 1.5s ease-out forwards;
        }

        .user {
            align-self: flex-end;
            color: var(--accent);
            text-align: right;
            padding-right: 20px;
            border-right: 1px solid rgba(255, 255, 255, 0.2);
            animation: fadeInRight 0.8s ease-out forwards;
        }

        /* 入力エリア */
        .input-area {
            padding: 30px;
            display: flex;
            border-top: 1px solid var(--border);
            gap: 20px;
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--border);
            color: var(--text);
            font-family: inherit;
            font-size: 1rem;
            padding: 10px;
            outline: none;
            transition: 0.4s;
        }
        input:focus { border-bottom-color: var(--accent); }

        button {
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            font-family: inherit;
            padding: 10px 30px;
            cursor: pointer;
            transition: 0.4s;
            letter-spacing: 0.2em;
        }
        button:hover {
            background: var(--accent);
            color: var(--bg);
        }

        @keyframes fadeInBlur {
            0% { opacity: 0; filter: blur(10px); transform: translateY(10px); }
            100% { opacity: 1; filter: blur(0); transform: translateY(0); }
        }

        @keyframes fadeInRight {
            0% { opacity: 0; transform: translateX(20px); }
            100% { opacity: 1; transform: translateX(0); }
        }

    </style>
</head>
<body>

    <a href="index.html" class="back-home">戻る</a>

    <div class="chat-container">
        <div class="chat-header">対話帳</div>
        <div id="log">
            <div class="msg ai">いらっしゃいませ。何かお手伝いできることはございますか。</div>
        </div>
        <div class="input-area">
            <input type="text" id="in" placeholder="言葉を認める..." autocomplete="off">
            <button onclick="send()">送信</button>
        </div>
    </div>

    <script>
        const inputField = document.getElementById('in');
        
        // エンターキーでも送信可能に
        inputField.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') send();
        });

        function send() {
            const val = inputField.value;
            const log = document.getElementById('log');
            if(!val) return;

            // ユーザーのメッセージ
            log.innerHTML += `<div class="msg user">${val}</div>`;
            inputField.value = "";

            // AIの応答（遅延させて高級感を出す）
            let response = "左様でございますか。静かな時間をお過ごしください。";
            if(val.includes("珈琲")) response = "本日は、琥珀の極深煎りが特におすすめでございます。";
            if(val.includes("おすすめ")) response = "甘味でしたら、自家製の密カステラをご用意しております。";
            if(val.includes("茶")) response = "宇治の静寂は、心まで洗われるような深い味わいでございます。";

            setTimeout(() => {
                const aiMsg = document.createElement('div');
                aiMsg.className = 'msg ai';
                aiMsg.innerText = response;
                log.appendChild(aiMsg);
                log.scrollTop = log.scrollHeight;
            }, 1000);
        }
    </script>
</body>
</html>
