<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>帳場案内 - 喫茶 木漏れ日</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
            background-color: #f7f5f0;
            color: #2c2520;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .chat-card {
            width: 400px;
            height: 580px;
            background: #ffffff;
            border: 1px solid #c2b69d;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.04);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background-color: #4a3b32;
            color: #ffffff;
            padding: 16px;
            text-align: center;
            font-family: 'Georgia', serif;
            letter-spacing: 2px;
            font-size: 15px;
        }

        #chat-history {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background-color: #faf9f6;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .bubble {
            max-width: 78%;
            padding: 10px 16px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.5;
        }

        .user-container {
            display: flex;
            justify-content: flex-end;
        }
        .user-bubble {
            background-color: #8a7355;
            color: #ffffff;
            border-bottom-right-radius: 2px;
        }

        .bot-container {
            display: flex;
            justify-content: flex-start;
        }
        .bot-bubble {
            background-color: #eaddcd;
            color: #2c2520;
            border-bottom-left-radius: 2px;
        }

        .chat-input-area {
            padding: 14px;
            background: #ffffff;
            border-top: 1px solid #eaddcd;
            display: flex;
            gap: 10px;
        }

        #chat-input {
            flex: 1;
            padding: 10px;
            border: 1px solid #c2b69d;
            border-radius: 6px;
            outline: none;
            font-size: 14px;
        }

        .send-btn {
            background-color: #4a3b32;
            color: white;
            border: none;
            padding: 0 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
        }
        .send-btn:hover {
            background-color: #615249;
        }

        /* 戻るエリア */
        .back-area {
            text-align: center;
            padding: 12px;
            background: #ffffff;
            border-top: 1px dashed #eaddcd;
        }
        .back-link {
            font-size: 13px;
            color: #8c7e6c;
            text-decoration: none;
            border-bottom: 1px dashed #c2b69d;
        }
    </style>
</head>
<body>

    <div class="chat-card">
        <div class="chat-header">帳場案内（自動応答）</div>
        
        <div id="chat-history">
            <div class="bot-container">
                <div class="bot-bubble bubble">いらっしゃいませ。木漏れ日の帳場案内です。何か気になることはございますか？（例：送料、時間）</div>
            </div>
        </div>

        <div class="chat-input-area">
            <input type="text" id="chat-input" placeholder="尋ねたい文字を入力...">
            <button class="send-btn" id="submit-btn">送信</button>
        </div>

        <div class="back-area">
            <a href="index.html" class="back-link">案内処へ戻る</a>
        </div>
    </div>

    <script>
        const chatInput = document.getElementById('chat-input');
        const submitBtn = document.getElementById('submit-btn');
        const chatHistory = document.getElementById('chat-history');

        function sendMessage() {
            const text = chatInput.value.trim();
            if (!text) return;

            // 1. ユーザーメッセージを生成して表示
            const userContainer = document.createElement('div');
            userContainer.className = "user-container";
            const userBubble = document.createElement('div');
            userBubble.className = "user-bubble bubble";
            userBubble.textContent = text;
            userContainer.appendChild(userBubble);
            chatHistory.appendChild(userContainer);

            chatInput.value = '';
            chatHistory.scrollTop = chatHistory.scrollHeight;

            // 2. 教材に準拠した条件分岐 (Logic)
            setTimeout(() => {
                let response = "担当者にお繋ぎします 🙇‍";
                if (text.includes("送料")) {
                    response = "全国一律500円です 🚚";
                } else if (text.includes("時間")) {
                    response = "9:00〜18:00です ⏰";
                }

                // ボットのメッセージを表示
                const botContainer = document.createElement('div');
                botContainer.className = "bot-container";
                const botBubble = document.createElement('div');
                botBubble.className = "bot-bubble bubble";
                botBubble.textContent = response;
                botContainer.appendChild(botBubble);
                chatHistory.appendChild(botContainer);

                chatHistory.scrollTop = chatHistory.scrollHeight;
            }, 600);
        }

        // クリックとEnterキーの紐付け
        submitBtn.addEventListener('click', sendMessage);
        chatInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });
    </script>

</body>
</html>
