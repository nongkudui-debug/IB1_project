<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>喫茶 木漏れ日 | 公式サイト</title>
    <style>
        :root {
            --main-bg: #1a1a1a;
            --accent-color: #d4b483;
            --text-color: #fdfaf6;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--main-bg);
            color: var(--text-color);
            font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;
            overflow: hidden; /* スクロール禁止 */
        }

        /* 背景に木漏れ日のような光の演出 */
        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 70% 20%, rgba(212, 180, 131, 0.15) 0%, transparent 50%);
            z-index: -1;
        }

        .container {
            display: flex;
            height: 100vh;
            padding: 40px;
            gap: 40px;
            align-items: center;
        }

        /* 左側：強烈なタイポグラフィ */
        .hero-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .shop-logo-bold {
            font-size: 5rem;
            writing-mode: vertical-rl;
            letter-spacing: 0.5em;
            border-left: 2px solid var(--accent-color);
            padding-right: 20px;
            margin-bottom: 20px;
            line-height: 1;
        }

        .dynamic-greeting {
            font-size: 1.2rem;
            color: var(--accent-color);
            margin-bottom: 20px;
            opacity: 0;
            transition: opacity 1s ease;
        }

        /* 右側：ギャラリーパネル */
        .visual-gallery {
            flex: 2;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            height: 80vh;
        }

        .panel {
            position: relative;
            overflow: hidden;
            border-radius: 5px;
            transition: transform 0.5s ease;
        }

        .panel:hover {
            transform: scale(1.02);
        }

        .panel img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(30%) contrast(1.1);
            transition: 0.5s;
        }

        .panel:hover img {
            filter: grayscale(0%) contrast(1.2);
        }

        .photo-caption {
            position: absolute;
            bottom: 20px;
            left: 20px;
            writing-mode: vertical-rl;
            background: rgba(0,0,0,0.6);
            padding: 10px 5px;
            font-size: 0.9rem;
            letter-spacing: 0.2em;
        }

        /* 予約ボタン：浮遊感のあるデザイン */
        .action-gate {
            position: absolute;
            bottom: 60px;
            right: 60px;
        }

        .btn-reserve-bold {
            display: inline-block;
            padding: 20px 50px;
            border: 1px solid var(--accent-color);
            color: var(--accent-color);
            text-decoration: none;
            font-size: 1.1rem;
            transition: 0.4s;
            position: relative;
            overflow: hidden;
        }

        .btn-reserve-bold:hover {
            background: var(--accent-color);
            color: var(--main-bg);
            box-shadow: 0 0 30px rgba(212, 180, 131, 0.4);
        }

        @media (max-width: 768px) {
            .container { flex-direction: column; overflow-y: auto; }
            .visual-gallery { grid-template-columns: 1fr; height: auto; }
            body { overflow: auto; }
        }
    </style>
</head>
<body>

    <div class="bg-overlay"></div>

    <div class="container">
        <header class="hero-section">
            <p id="greeting" class="dynamic-greeting">ようこそ、木漏れ日へ</p>
            <h1 class="shop-logo-bold">喫茶 木漏れ日</h1>
            <div class="concept-text" style="margin-top: 20px; line-height: 2;">
                <p>喧騒を忘れ、自分に帰る。<br>
                和モダンの静寂が、<br>
                あなたを待っています。</p>
            </div>
        </header>

        <main class="visual-gallery">
            <article class="panel">
                <img src="外観.png" alt="外観">
                <p class="photo-caption">路地裏の木漏れ日、静かなはじまり。</p>
            </article>

            <article class="panel">
                <img src="チル.png" alt="チル">
                <p class="photo-caption">何もしない贅沢を、ここで。</p>
            </article>

            <article class="panel">
                <img src="コーヒー.png" alt="珈琲">
                <p class="photo-caption">手仕事の温もり、淹れたての香り。</p>
            </article>
        </main>

        <div class="action-gate">
            <a href="#" class="btn-reserve-bold" onclick="showWelcome()">
                <span>御予約を承ります</span>
            </a>
        </div>
    </div>

    <script>
        // 1. 時間帯によって挨拶を変える（AI的な「おもてなし」演出）
        document.addEventListener('DOMContentLoaded', () => {
            const greetingElement = document.getElementById('greeting');
            const hour = new Date().getHours();
            let message = "";

            if (hour >= 5 && hour < 11) {
                message = "爽やかな朝の光とともに。";
            } else if (hour >= 11 && hour < 17) {
                message = "午後のひととき、穏やかな木漏れ日を。";
            } else {
                message = "一日の終わりに、静寂の安らぎを。";
            }

            greetingElement.textContent = message;
            greetingElement.style.opacity = "1";
        });

        // 2. インタラクティブな仕掛け
        function showWelcome() {
            alert("「喫茶 木漏れ日」へのご予約・お問い合わせありがとうございます。\n現在、静かなお席をご用意しております。");
        }
        
        // 3. マウスの動きに合わせて背景の光を動かす（迫力の演出）
        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth) * 100;
            const y = (e.clientY / window.innerHeight) * 100;
            document.querySelector('.bg-overlay').style.background = 
                `radial-gradient(circle at ${x}% ${y}%, rgba(212, 180, 131, 0.15) 0%, transparent 50%)`;
        });
    </script>
</body>
</html>
