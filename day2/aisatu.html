<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お出迎え - 喫茶 木漏れ日</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Georgia', 'Times New Roman', 'Hiragino Mincho ProN', 'MS Mincho', serif;
            background-color: #f7f5f0;
            color: #2c2520;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .wrapper {
            max-width: 500px;
            width: 100%;
            border: 1px solid #c2b69d;
            padding: 50px 30px;
            background-color: #ffffff;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            text-align: center;
        }

        /* 和風の格子や佇まいをイメージしたプレーンな箱 */
        #box {
            width: 100%;
            height: 150px;
            background-color: #faf9f6;
            border: 1px solid #d1c7bd;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            letter-spacing: 2px;
            color: #615249;
            margin-bottom: 40px;
            transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
        }

        /* 上品な和モダンボタン */
        #change-btn {
            padding: 12px 40px;
            font-family: inherit;
            font-size: 14px;
            color: #ffffff;
            background-color: #4a3b32;
            border: none;
            cursor: pointer;
            letter-spacing: 1px;
            transition: background-color 0.3s;
        }

        #change-btn:hover { 
            background-color: #615249; 
        }

        /* 案内処へ戻るリンク */
        .back-btn {
            font-size: 13px;
            color: #8c7e6c;
            text-decoration: none;
            border-bottom: 1px dashed #c2b69d;
            transition: color 0.3s;
        }
        .back-btn:hover {
            color: #4a3b32;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <div id="box">静かに扉を叩く。</div>
        
        <div class="btn-group">
            <button id="change-btn">暖簾をくぐる</button>
            <a href="index.html" class="back-btn">案内処へ戻る</a>
        </div>
    </div>

    <script>
        const box = document.getElementById('box');
        const button = document.getElementById('change-btn');

        button.addEventListener('click', () => {
            // 背景を温かみのある木漏れ日（薄黄色）に、文字をいらっしゃいませに変更
            box.style.backgroundColor = '#ffeaa7'; 
            box.style.color = '#2c2520';
            box.style.borderColor = '#8a7355';
            box.textContent = 'いらっしゃいませ！';
            
            // オリジナリティエフェクト：少し文字を強調
            box.style.fontWeight = 'bold';
        });
    </script>

</body>
</html>
