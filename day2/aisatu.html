<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>空間演出 | 喫茶 木漏れ日</title>
    <style>
        :root {
            --bg: #0f0f0f;
            --accent: #d4b483;
            --text: #fdfaf6;
            --sub-text: rgba(253, 250, 246, 0.4);
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .back-home {
            position: fixed;
            top: 30px;
            left: 30px;
            text-decoration: none;
            color: var(--accent);
            font-size: 0.8rem;
            letter-spacing: 0.2em;
            z-index: 100;
            opacity: 0.6;
            transition: 0.5s;
        }
        .back-home:hover { opacity: 1; }

        /* 背景に漂う詩的なテキスト（縦書き） */
        .background-poem {
            position: fixed;
            writing-mode: vertical-rl;
            color: var(--accent);
            opacity: 0.03; /* 極限まで薄くして空気感を出す */
            font-size: 2.5rem;
            letter-spacing: 1.5em;
            white-space: nowrap;
            z-index: -1;
            pointer-events: none;
            user-select: none;
        }

        .poem-left { left: 5%; top: 50%; transform: translateY(-50%); }
        .poem-right { right: 5%; top: 50%; transform: translateY(-50%); }

        /* 中央：重層的なタイポグラフィ */
        .hero-container {
            position: relative;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .main-title {
            font-size: 6rem;
            letter-spacing: 1em;
            margin: 0;
            padding-left: 1em;
            font-weight: 200;
            animation: fadeInBlur 4s ease-out forwards;
        }

        .story-text {
            margin-top: 30px;
            font-size: 0.9rem;
            line-height: 3;
            letter-spacing: 0.5em;
            color: var(--sub-text);
            opacity: 0;
            animation: fadeInUp 3s ease-out 1.5s forwards;
        }

        .dynamic-msg {
            margin-top: 50px;
            font-size: 1.2rem;
            color: var(--accent);
            letter-spacing: 0.3em;
            border-top: 1px solid var(--accent);
            padding-top: 20px;
            opacity: 0;
            animation: fadeInUp 2s ease-out 2.5s forwards;
        }

        @keyframes fadeInBlur {
            0% { opacity: 0; filter: blur(30px); transform: scale(0.9); }
            100% { opacity: 1; filter: blur(0); transform: scale(1); }
        }

        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(-10px); }
        }

        /* 木漏れ日の揺らぎ */
        .sunlight {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle at var(--x, 50%) var(--y, 50%), rgba(212, 180, 131, 0.15) 0%, transparent 60%);
            z-index: -2;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-home">一覧へ戻る</a>
    
    <div class="background-poem poem-left">路地裏に差し込む光、淹れたての香り、静寂の贅沢。</div>
    <div class="background-poem poem-right">心ほどけるひとときを、あなたに。</div>

    <div class="sunlight" id="sun"></div>

    <div class="hero-container">
        <h1 class="main-title">木漏れ日</h1>
        
        <div class="story-text">
            何もしない。ただ、それだけの贅沢を。<br>
            琥珀色の雫が落ちる音に耳を澄ませ、<br>
            過ぎゆく季節の移ろいを感じる場所。
        </div>

        <p id="greeting" class="dynamic-msg"></p>
    </div>

    <script>
        window.onload = () => {
            const h = new Date().getHours();
            const g = document.getElementById('greeting');
            // AIによる時系列のメッセージ生成（シミュレーション）
            if(h < 10) g.innerText = "朝露の残る、清らかな目覚めとともに。";
            else if(h < 14) g.innerText = "陽光が最も美しく踊る、正午の休息。";
            else if(h < 18) g.innerText = "茜色に染まる、黄昏のノスタルジー。";
            else g.innerText = "月の光に守られた、静謐なる夜の帳。";
        };

        document.addEventListener('mousemove', (e) => {
            const sun = document.getElementById('sun');
            const x = (e.clientX / window.innerWidth) * 100;
            const y = (e.clientY / window.innerHeight) * 100;
            sun.style.setProperty('--x', x + '%');
            sun.style.setProperty('--y', y + '%');
        });
    </script>
</body>
</html>
