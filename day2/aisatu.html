<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>空間演出 | 喫茶 木漏れ日</title>
    <style>
        :root { --bg: #1a1a1a; --accent: #d4b483; --text: #fdfaf6; }
        body { background: var(--bg); color: var(--text); font-family: serif; margin: 0; display: flex; align-items: center; height: 100vh; padding: 50px; overflow: hidden; }
        .back-home { position: fixed; top: 20px; left: 20px; text-decoration: none; color: var(--accent); border: 1px solid var(--accent); padding: 8px 15px; transition: 0.3s; }
        .back-home:hover { background: var(--accent); color: var(--bg); }
        .hero { font-size: 4rem; writing-mode: vertical-rl; letter-spacing: 0.5em; border-left: 1px solid var(--accent); padding-right: 30px; }
        .msg { font-size: 1.2rem; color: var(--accent); margin-left: 50px; opacity: 0; transition: 2s; }
    </style>
</head>
<body>
    <a href="index.html" class="back-home">← 戻る</a>
    <h1 class="hero">喫茶 木漏れ日</h1>
    <p id="greeting" class="msg"></p>
    <script>
        window.onload = () => {
            const h = new Date().getHours();
            const g = document.getElementById('greeting');
            if(h<11) g.innerText = "爽やかな朝の光とともに。";
            else if(h<17) g.innerText = "午後のひととき、穏やかな木漏れ日を。";
            else g.innerText = "一日の終わりに、静寂の安らぎを。";
            g.style.opacity = 1;
        };
    </script>
</body>
</html>
